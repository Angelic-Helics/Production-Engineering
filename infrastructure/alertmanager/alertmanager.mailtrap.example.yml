global:
  resolve_timeout: 1m
  smtp_smarthost: 'sandbox.smtp.mailtrap.io:2525'
  smtp_from: 'alerts@kitchenflow.local'
  smtp_auth_username: 'MAILTRAP_USERNAME'
  smtp_auth_password: 'MAILTRAP_PASSWORD'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1m
  receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: 'to@example.com'
        send_resolved: true
