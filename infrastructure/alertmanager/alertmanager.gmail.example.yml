global:
  resolve_timeout: 1m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'YOUR_GMAIL_ADDRESS@gmail.com'
  smtp_auth_username: 'YOUR_GMAIL_ADDRESS@gmail.com'
  smtp_auth_password: 'YOUR_16_DIGIT_GOOGLE_APP_PASSWORD'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1m
  receiver: 'gmail'

receivers:
  - name: 'gmail'
    email_configs:
      - to: 'DESTINATION_EMAIL@gmail.com'
        send_resolved: true
        tls_config:
          insecure_skip_verify: true
